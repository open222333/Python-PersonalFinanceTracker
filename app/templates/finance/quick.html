<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#1e2235"/>
  <title>快速記帳</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <style>
    :root {
      --clr-income:  #10b981;
      --clr-expense: #ef4444;
      --clr-primary: #5c7cfa;
      --clr-bg:      #f0f2f7;
      --clr-card:    #ffffff;
      --clr-topbar:  #1e2235;
      --clr-muted:   #94a3b8;
      --clr-border:  #e2e8f0;
      --clr-text:    #1e293b;
      --clr-sub:     #64748b;
      --radius:      14px;
      --safe-b:      env(safe-area-inset-bottom, 0px);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%; overflow: hidden;
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: var(--clr-bg); color: var(--clr-text);
      overscroll-behavior: none;
      -webkit-text-size-adjust: 100%;
    }

    /* ── App shell ───────────────────────── */
    #app {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      max-width: 430px; margin: 0 auto;
    }

    /* desktop phone-frame */
    @media (min-width: 600px) {
      body { background: #2d3558; }
      #app {
        top: 16px; bottom: 16px;
        border-radius: 40px;
        box-shadow: 0 24px 80px rgba(0,0,0,.55);
        overflow: hidden;
      }
    }

    /* ── Login overlay ────────────────────── */
    #login-overlay {
      position: absolute; inset: 0; z-index: 9999;
      background: var(--clr-topbar);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px;
      padding: 40px 32px; overflow-y: auto;
    }
    #login-overlay h1 { color: #fff; font-size: 1.5rem; font-weight: 700; }
    .login-field {
      width: 100%; padding: 13px 16px;
      border: 1.5px solid #3d4566; border-radius: 12px;
      background: #2c3148; color: #fff; font-size: 1rem;
      outline: none; transition: border-color .15s;
    }
    .login-field:focus { border-color: var(--clr-primary); }
    .login-field::placeholder { color: #4e5d80; }
    .auth-submit-btn {
      width: 100%; padding: 14px;
      color: #fff; border: none; border-radius: 12px;
      font-size: 1rem; font-weight: 600; cursor: pointer; transition: opacity .15s;
    }
    .auth-submit-btn:active { opacity: .8; }
    #btn-login    { background: var(--clr-primary); }
    #btn-register { background: #10b981; }
    .auth-err { color: #f87171; font-size: .85rem; min-height: 18px; }
    .auth-ok  { color: #34d399; font-size: .85rem; min-height: 18px; }
    .auth-hint { color: #4e5d80; font-size: .72rem; }

    /* ── Topbar ───────────────────────────── */
    #topbar {
      height: 52px; background: var(--clr-topbar);
      display: flex; align-items: center; padding: 0 16px; gap: 10px;
      flex-shrink: 0; color: #fff;
    }
    .tb-title { font-weight: 700; font-size: 1rem; color: #fff; flex: 1; }
    .tb-user  { font-size: .78rem; color: var(--clr-muted); }
    .tb-btn   {
      background: #2c3148; border: 1px solid #3d4566; color: #cbd5e1;
      border-radius: 8px; padding: 5px 10px; font-size: .78rem; cursor: pointer;
      display: flex; align-items: center; gap: 4px;
      border: none;
    }
    .tb-btn:active { background: #3a4060; }

    /* ── Main scroll area ─────────────────── */
    #main {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: none;
      background: var(--clr-bg);
    }
    #main::-webkit-scrollbar { display: none; }

    /* ── Type toggle ──────────────────────── */
    #type-bar {
      display: flex; gap: 10px;
      padding: 14px 16px 0;
      flex-shrink: 0;
    }
    .type-btn {
      flex: 1; padding: 13px 0;
      border: 2px solid transparent; border-radius: var(--radius);
      font-size: 1rem; font-weight: 600; cursor: pointer;
      background: var(--clr-card); color: var(--clr-sub);
      transition: all .18s; display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .type-btn.active[data-type="expense"] {
      background: #fef2f2; border-color: var(--clr-expense); color: var(--clr-expense);
    }
    .type-btn.active[data-type="income"] {
      background: #f0fdf4; border-color: var(--clr-income); color: var(--clr-income);
    }
    .type-btn:active { transform: scale(.97); }

    /* ── Amount display ───────────────────── */
    #amount-wrap {
      margin: 12px 16px 0;
      background: var(--clr-card); border-radius: var(--radius);
      padding: 16px 20px;
    }
    #amount-label { font-size: .78rem; color: var(--clr-sub); margin-bottom: 4px; }
    #amount-display {
      font-size: 2.4rem; font-weight: 700; min-height: 56px;
      letter-spacing: -.5px; transition: color .18s;
      display: flex; align-items: center;
    }
    #amount-display .amt-cursor {
      display: inline-block; width: 3px; height: 36px;
      background: currentColor; margin-left: 2px; border-radius: 2px;
      animation: blink .9s step-end infinite;
    }
    @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    #amount-display.type-expense { color: var(--clr-expense); }
    #amount-display.type-income  { color: var(--clr-income);  }

    /* ── Category ─────────────────────────── */
    #cat-section {
      margin: 12px 16px 0;
    }
    #cat-label { font-size: .78rem; color: var(--clr-sub); margin-bottom: 8px; }
    #cat-grid {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .cat-item {
      background: var(--clr-card); border-radius: 12px;
      padding: 10px 4px 8px;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      cursor: pointer; border: 2px solid transparent;
      transition: all .15s; min-height: 64px; justify-content: center;
    }
    .cat-item .cat-icon {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .95rem; flex-shrink: 0;
    }
    .cat-item .cat-name {
      font-size: .7rem; color: var(--clr-sub); text-align: center;
      line-height: 1.2; word-break: break-all;
    }
    .cat-item.selected {
      border-color: var(--clr-primary);
      background: #f0f4ff;
    }
    .cat-item.selected .cat-name { color: var(--clr-primary); font-weight: 700; font-size: .88rem; }
    .cat-item.selected .cat-icon { display: none; }
    .cat-item:active { transform: scale(.93); }

    /* ── Note + Date ─────────────────────── */
    #meta-row {
      margin: 12px 16px 0;
      display: flex; gap: 8px;
    }
    .meta-card {
      background: var(--clr-card); border-radius: var(--radius);
      padding: 10px 12px; flex: 1;
    }
    .meta-card label {
      font-size: .7rem; color: var(--clr-sub); display: block; margin-bottom: 4px;
    }
    .meta-input {
      width: 100%; border: none; outline: none;
      font-size: .9rem; color: var(--clr-text); background: transparent;
      font-family: inherit;
    }
    .meta-date-btns {
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .date-pill {
      padding: 3px 10px; border-radius: 20px; font-size: .75rem;
      background: #f1f5f9; color: var(--clr-sub); cursor: pointer; border: none;
      transition: all .15s;
    }
    .date-pill.active {
      background: var(--clr-primary); color: #fff;
    }
    .date-pill:active { transform: scale(.93); }
    #custom-date-wrap { margin-top: 6px; }
    #custom-date-input {
      border: 1.5px solid var(--clr-border); border-radius: 8px;
      padding: 5px 8px; font-size: .82rem; width: 100%;
      color: var(--clr-text); outline: none; background: #f8fafc;
    }
    #custom-date-input:focus { border-color: var(--clr-primary); }

    /* ── Numpad ──────────────────────────── */
    #numpad-wrap {
      margin: 12px 16px 0;
      background: var(--clr-card); border-radius: var(--radius);
      padding: 10px;
    }
    #numpad {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
    }
    .np-btn {
      padding: 16px 0; border-radius: 10px;
      border: none; background: #f1f5f9;
      font-size: 1.35rem; font-weight: 500; color: var(--clr-text);
      cursor: pointer; transition: all .1s; user-select: none;
      display: flex; align-items: center; justify-content: center;
    }
    .np-btn:active { background: #dde4f0; transform: scale(.94); }
    .np-btn.np-del { font-size: 1.1rem; color: var(--clr-sub); }
    .np-btn.np-dot { font-size: 1.5rem; }

    /* ── Submit ──────────────────────────── */
    #submit-wrap { margin: 10px 16px calc(12px + var(--safe-b)); }
    #btn-submit {
      width: 100%; padding: 16px;
      border: none; border-radius: var(--radius);
      font-size: 1.1rem; font-weight: 700; color: #fff; cursor: pointer;
      transition: all .15s; letter-spacing: .5px;
    }
    #btn-submit:active { transform: scale(.97); opacity: .9; }
    #btn-submit.type-expense { background: var(--clr-expense); }
    #btn-submit.type-income  { background: var(--clr-income);  }

    /* ── Recent panel (bottom sheet) ─────── */
    #recent-overlay {
      display: none;
      position: absolute; inset: 0; z-index: 800;
      background: rgba(0,0,0,.45);
    }
    #recent-overlay.open { display: block; }
    #recent-sheet {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: var(--clr-card); border-radius: 20px 20px 0 0;
      max-height: 75%; display: flex; flex-direction: column;
      transform: translateY(100%); transition: transform .3s ease;
    }
    #recent-overlay.open #recent-sheet { transform: translateY(0); }
    #recent-handle {
      text-align: center; padding: 12px 0 4px;
      cursor: pointer;
    }
    #recent-handle::before {
      content: ''; display: inline-block;
      width: 40px; height: 4px; border-radius: 2px; background: #ddd;
    }
    #recent-title {
      padding: 0 16px 10px;
      font-weight: 600; font-size: .95rem; color: var(--clr-text);
      border-bottom: 1px solid var(--clr-border);
    }
    #recent-list {
      flex: 1; overflow-y: auto; padding: 8px 0;
      padding-bottom: calc(8px + var(--safe-b));
    }
    .rec-item {
      display: flex; align-items: center; padding: 11px 16px; gap: 12px;
    }
    .rec-item + .rec-item { border-top: 1px solid #f1f5f9; }
    .rec-icon {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; flex-shrink: 0;
    }
    .rec-info { flex: 1; min-width: 0; }
    .rec-desc {
      font-size: .88rem; font-weight: 500; color: var(--clr-text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .rec-meta { font-size: .73rem; color: var(--clr-muted); margin-top: 2px; }
    .rec-amount {
      font-size: .95rem; font-weight: 700; flex-shrink: 0;
    }
    .rec-amount.expense { color: var(--clr-expense); }
    .rec-amount.income  { color: var(--clr-income);  }

    /* ── Toast ───────────────────────────── */
    #toast-container {
      position: absolute; top: 64px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; gap: 8px; z-index: 9000;
      pointer-events: none; width: calc(100% - 32px);
    }
    .toast-msg {
      padding: 12px 16px; border-radius: 12px;
      font-size: .88rem; font-weight: 500; color: #fff;
      box-shadow: 0 4px 16px rgba(0,0,0,.2);
      animation: slideIn .25s ease, fadeOut .3s ease 2.2s forwards;
      text-align: center;
    }
    .toast-msg.success { background: var(--clr-income); }
    .toast-msg.error   { background: var(--clr-expense); }
    .toast-msg.info    { background: var(--clr-primary); }
    @keyframes slideIn  { from { opacity:0; transform: translateY(-10px); } to { opacity:1; transform: translateY(0); } }
    @keyframes fadeOut  { from { opacity:1; } to { opacity:0; } }

    /* ── Loading spinner ─────────────────── */
    .spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.3); border-top-color: #fff;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Mode bar (收支 / 股票) ─────────── */
    #mode-bar {
      display: flex; gap: 0;
      padding: 10px 16px 0;
      flex-shrink: 0;
    }
    .mode-btn {
      flex: 1; padding: 9px 0;
      border: 1.5px solid var(--clr-border); background: var(--clr-card);
      color: var(--clr-sub); font-size: .88rem; font-weight: 600;
      cursor: pointer; transition: all .18s;
    }
    .mode-btn:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .mode-btn:last-child  { border-radius: 0 var(--radius) var(--radius) 0; }
    .mode-btn.active { background: var(--clr-primary); border-color: var(--clr-primary); color: #fff; }
    .mode-btn:active { opacity: .8; }

    /* ── Stock panel ─────────────────────── */
    #stock-panel { display: none; flex-direction: column; }
    #stock-panel.visible { display: flex; }

    .stk-ticker-row {
      margin: 12px 16px 0;
      display: flex; gap: 8px; align-items: stretch;
    }
    .stk-ticker-input {
      flex: 1; padding: 12px 14px;
      background: var(--clr-card); border: 2px solid var(--clr-border);
      border-radius: var(--radius); font-size: 1.4rem; font-weight: 700;
      color: var(--clr-text); outline: none; text-transform: uppercase;
      font-family: inherit; letter-spacing: 1px;
    }
    .stk-ticker-input:focus { border-color: var(--clr-primary); }
    .stk-ticker-input::placeholder { font-size: .9rem; font-weight: 400; color: var(--clr-muted); letter-spacing: 0; }
    .stk-market-wrap { display: flex; flex-direction: column; gap: 4px; }
    .stk-mkt-btn {
      flex: 1; padding: 6px 14px;
      border: 1.5px solid var(--clr-border); border-radius: 8px;
      background: var(--clr-card); color: var(--clr-sub);
      font-size: .78rem; font-weight: 600; cursor: pointer; transition: all .15s;
    }
    .stk-mkt-btn.active { background: #eff6ff; border-color: #3b82f6; color: #3b82f6; }
    .stk-mkt-btn:active { transform: scale(.93); }

    .stk-action-bar { margin: 10px 16px 0; display: flex; gap: 8px; }
    .stk-action-btn {
      flex: 1; padding: 11px 0;
      border: 2px solid transparent; border-radius: var(--radius);
      font-size: .88rem; font-weight: 600; cursor: pointer;
      background: var(--clr-card); color: var(--clr-sub); transition: all .18s;
    }
    .stk-action-btn[data-action="buy"].active      { background: #eff6ff; border-color: #3b82f6; color: #3b82f6; }
    .stk-action-btn[data-action="sell"].active     { background: #fff7ed; border-color: #f97316; color: #f97316; }
    .stk-action-btn[data-action="dividend"].active { background: #f0fdf4; border-color: var(--clr-income); color: var(--clr-income); }
    .stk-action-btn:active { transform: scale(.97); }

    .stk-fields-wrap {
      margin: 10px 16px 0;
      background: var(--clr-card); border-radius: var(--radius); overflow: hidden;
    }
    .stk-field-bar { display: flex; border-bottom: 1px solid var(--clr-border); }
    .stk-fld-btn {
      flex: 1; padding: 9px 4px;
      border: none; background: transparent; font-size: .75rem;
      color: var(--clr-sub); cursor: pointer; transition: all .15s;
      border-bottom: 3px solid transparent; margin-bottom: -1px;
    }
    .stk-fld-btn.active { color: var(--clr-primary); border-bottom-color: var(--clr-primary); font-weight: 700; }
    .stk-fld-btn:active { background: #f8fafc; }
    .stk-field-values { display: grid; grid-template-columns: repeat(3, 1fr); padding: 8px; gap: 6px; }
    .stk-fv-item {
      text-align: center; padding: 6px 4px;
      border-radius: 8px; background: #f8fafc;
    }
    .stk-fv-label { font-size: .65rem; color: var(--clr-muted); margin-bottom: 3px; }
    .stk-fv-val   { font-size: 1rem; font-weight: 700; color: var(--clr-text); }
    .stk-fv-item.active { background: #eff6ff; }
    .stk-fv-item.active .stk-fv-val { color: var(--clr-primary); }

    .stk-amount-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-top: 1px solid var(--clr-border);
    }
    .stk-amt-label { font-size: .75rem; color: var(--clr-sub); }
    .stk-amt-val   { font-size: 1.5rem; font-weight: 700; color: var(--clr-text); }

    /* Stock submit colours */
    #btn-submit.type-buy      { background: #3b82f6; }
    #btn-submit.type-sell     { background: #f97316; }
    #btn-submit.type-dividend { background: var(--clr-income); }

    /* Recent tabs */
    #recent-tabs {
      display: flex; padding: 0 12px;
      border-bottom: 1px solid var(--clr-border); gap: 4px;
    }
    .rtab-btn {
      padding: 8px 14px; border: none; background: transparent;
      font-size: .82rem; color: var(--clr-sub); cursor: pointer;
      border-bottom: 2.5px solid transparent; margin-bottom: -1px;
    }
    .rtab-btn.active { color: var(--clr-primary); border-bottom-color: var(--clr-primary); font-weight: 700; }
    .rec-amount.buy      { color: #3b82f6; }
    .rec-amount.sell     { color: #f97316; }
    .rec-amount.dividend { color: var(--clr-income); }
  </style>
</head>
<body>

<div id="app">
  <!-- Login Overlay -->
  <div id="login-overlay">
    <h1>💰 快速記帳</h1>
    <p id="ql-subtitle" style="color:var(--clr-muted);font-size:.88rem;text-align:center;margin:0">請登入以開始記錄</p>

    <!-- 登入表單 -->
    <div id="ql-login-form" style="width:100%;display:flex;flex-direction:column;gap:12px">
      <input id="inp-user" class="login-field" type="text" placeholder="帳號" autocomplete="username"/>
      <input id="inp-pass" class="login-field" type="password" placeholder="密碼" autocomplete="current-password"/>
      <div id="login-err" class="auth-err"></div>
      <button id="btn-login" class="auth-submit-btn">登入</button>
      <div style="text-align:center;margin-top:4px">
        <span style="color:#4e5d80;font-size:.8rem">還沒有帳號？</span>
        <button onclick="switchQlTab('register')"
                style="background:none;border:none;color:var(--clr-primary);font-size:.8rem;font-weight:600;cursor:pointer;padding:0">
          立即註冊 →
        </button>
      </div>
    </div>

    <!-- 註冊表單 -->
    <div id="ql-register-form" style="width:100%;display:none;flex-direction:column;gap:10px">
      <input id="reg-user"    class="login-field" type="text"     placeholder="帳號（英數字，3-32 字）" autocomplete="off"/>
      <input id="reg-name"    class="login-field" type="text"     placeholder="顯示名稱（選填）"/>
      <input id="reg-pw"      class="login-field" type="password" placeholder="密碼（至少 6 碼）" autocomplete="new-password"/>
      <input id="reg-pw2"     class="login-field" type="password" placeholder="確認密碼" autocomplete="new-password"/>
      <div id="register-err" class="auth-err"></div>
      <div id="register-ok"  class="auth-ok"></div>
      <button id="btn-register" class="auth-submit-btn">建立帳號</button>
      <div style="text-align:center;margin-top:4px">
        <button onclick="switchQlTab('login')"
                style="background:none;border:none;color:var(--clr-muted);font-size:.8rem;cursor:pointer;padding:0">
          ← 返回登入
        </button>
      </div>
    </div>
  </div>

  <!-- Topbar -->
  <div id="topbar">
    <span class="tb-title">💰 快速記帳</span>
    <span class="tb-user" id="topbar-user"></span>
    <button class="tb-btn" id="btn-history" title="最近記錄">
      <i class="bi bi-clock-history"></i>
    </button>
    <button class="tb-btn" id="btn-goto-dashboard" title="主頁" onclick="window.location.href='/finance/'">
      <i class="bi bi-house"></i>
    </button>
  </div>

  <!-- Main -->
  <div id="main">
    <!-- Mode Bar -->
    <div id="mode-bar">
      <button class="mode-btn active" data-mode="txn">💰 收支</button>
      <button class="mode-btn" data-mode="stock">📈 股票</button>
    </div>

    <!-- Stock Panel (hidden when mode=txn) -->
    <div id="stock-panel">
      <!-- Ticker + Market -->
      <div class="stk-ticker-row">
        <input id="stk-ticker" class="stk-ticker-input" type="text"
               placeholder="股票代號（如 2330）"
               autocomplete="off" autocapitalize="characters" spellcheck="false"/>
        <div class="stk-market-wrap">
          <button class="stk-mkt-btn active" data-market="TW">台股</button>
          <button class="stk-mkt-btn" data-market="US">美股</button>
        </div>
      </div>
      <!-- Action toggle -->
      <div class="stk-action-bar">
        <button class="stk-action-btn active" data-action="buy">🟢 買入</button>
        <button class="stk-action-btn" data-action="sell">🔴 賣出</button>
        <button class="stk-action-btn" data-action="dividend">💵 股利</button>
      </div>
      <!-- Field selector + display -->
      <div class="stk-fields-wrap">
        <div class="stk-field-bar">
          <button class="stk-fld-btn active" data-field="shares" id="stk-fld-label-shares">股數</button>
          <button class="stk-fld-btn" data-field="price" id="stk-fld-label-price">價格</button>
          <button class="stk-fld-btn" data-field="fee">手續費</button>
        </div>
        <div class="stk-field-values">
          <div class="stk-fv-item active" id="stk-fv-shares">
            <div class="stk-fv-label" id="stk-fv-label-shares">股數</div>
            <div class="stk-fv-val" id="stk-val-shares">0</div>
          </div>
          <div class="stk-fv-item" id="stk-fv-price">
            <div class="stk-fv-label" id="stk-fv-label-price">價格</div>
            <div class="stk-fv-val" id="stk-val-price">0</div>
          </div>
          <div class="stk-fv-item" id="stk-fv-fee">
            <div class="stk-fv-label">手續費</div>
            <div class="stk-fv-val" id="stk-val-fee">0</div>
          </div>
        </div>
        <div class="stk-amount-row">
          <span class="stk-amt-label" id="stk-amt-label">交易金額（股數 × 價格）</span>
          <span class="stk-amt-val" id="stk-computed-amt">$0</span>
        </div>
      </div>
    </div>

    <!-- Type Toggle -->
    <div id="type-bar">
      <button class="type-btn active" data-type="expense">
        <i class="bi bi-arrow-up-circle-fill"></i> 支出
      </button>
      <button class="type-btn" data-type="income">
        <i class="bi bi-arrow-down-circle-fill"></i> 收入
      </button>
    </div>

    <!-- Amount Display -->
    <div id="amount-wrap">
      <div id="amount-label">金額</div>
      <div id="amount-display" class="type-expense">
        <span id="amount-text">0</span><span class="amt-cursor"></span>
      </div>
    </div>

    <!-- Category -->
    <div id="cat-section">
      <div id="cat-label">分類</div>
      <div id="cat-grid">
        <div class="cat-item" style="opacity:.4;pointer-events:none">
          <div class="cat-icon" style="background:#eee"><i class="bi bi-hourglass"></i></div>
          <div class="cat-name">載入中…</div>
        </div>
      </div>
    </div>

    <!-- Note + Date -->
    <div id="meta-row">
      <div class="meta-card" style="flex:1.3">
        <label>備註</label>
        <input id="inp-note" class="meta-input" type="text" placeholder="選填"/>
      </div>
      <div class="meta-card" style="flex:1.7">
        <label>日期</label>
        <div class="meta-date-btns">
          <button class="date-pill active" data-d="today">今天</button>
          <button class="date-pill" data-d="yesterday">昨天</button>
          <button class="date-pill" data-d="custom">自訂</button>
        </div>
        <div id="custom-date-wrap" style="display:none">
          <input id="custom-date-input" type="date"/>
        </div>
      </div>
    </div>

    <!-- Numpad -->
    <div id="numpad-wrap">
      <div id="numpad">
        <button class="np-btn" data-val="7">7</button>
        <button class="np-btn" data-val="8">8</button>
        <button class="np-btn" data-val="9">9</button>
        <button class="np-btn" data-val="4">4</button>
        <button class="np-btn" data-val="5">5</button>
        <button class="np-btn" data-val="6">6</button>
        <button class="np-btn" data-val="1">1</button>
        <button class="np-btn" data-val="2">2</button>
        <button class="np-btn" data-val="3">3</button>
        <button class="np-btn np-del" data-val="del"><i class="bi bi-backspace"></i></button>
        <button class="np-btn" data-val="0">0</button>
        <button class="np-btn np-dot" data-val=".">·</button>
      </div>
    </div>

    <!-- Submit -->
    <div id="submit-wrap">
      <button id="btn-submit" class="type-expense">記錄支出</button>
    </div>
  </div><!-- /main -->

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Recent bottom sheet -->
  <div id="recent-overlay">
    <div id="recent-sheet">
      <div id="recent-handle"></div>
      <div id="recent-tabs">
        <button class="rtab-btn active" data-rtab="txn">收支記帳</button>
        <button class="rtab-btn" data-rtab="stock">股票記錄</button>
      </div>
      <div id="recent-list"></div>
    </div>
  </div>
</div><!-- /app -->

<script>
// ══════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════
const S = {
  token:      localStorage.getItem('finance_token') || '',
  username:   localStorage.getItem('finance_username') || '',
  displayName:localStorage.getItem('finance_display_name') || '',
  // ── txn mode ───────────────────────
  type:       'expense',      // 'expense' | 'income'
  amtRaw:     '0',            // raw string, e.g. "1500" "150.5"
  catId:      null,
  date:       'today',        // 'today' | 'yesterday' | 'custom'
  customDate: '',
  cats:       [],
  // ── top-level mode ─────────────────
  mode:       'txn',          // 'txn' | 'stock'
  recentTab:  'txn',
  // ── stock mode ─────────────────────
  stk: {
    ticker:      '',
    market:      'TW',
    action:      'buy',       // 'buy' | 'sell' | 'dividend'
    shares:      '0',
    price:       '0',
    fee:         '0',
    activeField: 'shares',    // which field numpad targets
  },
};

// ══════════════════════════════════════════════════════════
// Utils
// ══════════════════════════════════════════════════════════
function haptic(ms = 30) { try { navigator.vibrate(ms); } catch(_){} }

function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast-msg ${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 2600);
}

function fmtAmount(raw) {
  if (!raw || raw === '0') return '0';
  const n = parseFloat(raw);
  if (isNaN(n)) return raw;
  return n.toLocaleString('zh-TW', { maximumFractionDigits: 2 });
}

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function yesterdayStr() {
  const d = new Date(); d.setDate(d.getDate() - 1);
  return d.toISOString().slice(0, 10);
}
function getDate() {
  if (S.date === 'today')     return todayStr();
  if (S.date === 'yesterday') return yesterdayStr();
  return S.customDate || todayStr();
}

// ══════════════════════════════════════════════════════════
// API
// ══════════════════════════════════════════════════════════
async function apiFetch(path, opts = {}) {
  const res = await fetch(path, {
    headers: {
      'Content-Type': 'application/json',
      ...(S.token ? { 'Authorization': `Bearer ${S.token}` } : {}),
    },
    ...opts,
  });
  if (res.status === 401) {
    logout();
    throw new Error('未登入');
  }
  return res.json();
}

async function doLogin(username, password) {
  const r = await fetch('/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password }),
  });
  const d = await r.json();
  if (!d.success) throw new Error(d.message || '登入失敗');
  S.token       = d.token;
  S.username    = d.username;
  S.displayName = d.display_name || d.username;
  localStorage.setItem('finance_token',        S.token);
  localStorage.setItem('finance_username',     S.username);
  localStorage.setItem('finance_display_name', S.displayName);
  return d;
}

function logout() {
  S.token = ''; S.username = ''; S.displayName = '';
  localStorage.removeItem('finance_token');
  localStorage.removeItem('finance_username');
  localStorage.removeItem('finance_display_name');
  document.getElementById('login-overlay').style.display = 'flex';
}

// ══════════════════════════════════════════════════════════
// Categories
// ══════════════════════════════════════════════════════════
async function loadCategories() {
  try {
    const d = await apiFetch(`/finance/category/?type=${S.type}`);
    S.cats = d.data || [];
    renderCats();
  } catch(e) {
    console.warn('loadCategories', e);
  }
}

function renderCats() {
  const grid = document.getElementById('cat-grid');
  const filtered = S.cats.filter(c => c.type === S.type || !c.type);
  if (!filtered.length) {
    grid.innerHTML = `<div style="grid-column:span 4;color:var(--clr-muted);font-size:.82rem;padding:8px 0">無分類</div>`;
    return;
  }
  grid.innerHTML = filtered.map(c => {
    const bg  = c.color || '#5c7cfa';
    const raw = c.icon  || 'bi-tag';
    const icoHtml = raw.startsWith('bi-')
      ? `<i class="bi ${raw}"></i>`
      : raw;   // emoji 直接顯示
    const sel = S.catId === c.id ? 'selected' : '';
    return `<div class="cat-item ${sel}" data-id="${c.id}" onclick="selectCat(${c.id})">
      <div class="cat-icon" style="background:${bg}22;color:${bg}">${icoHtml}</div>
      <div class="cat-name">${c.name}</div>
    </div>`;
  }).join('');
}

function selectCat(id) {
  haptic(20);
  S.catId = (S.catId === id) ? null : id;
  renderCats();
}

// ══════════════════════════════════════════════════════════
// Type toggle
// ══════════════════════════════════════════════════════════
function setType(type) {
  haptic(20);
  S.type  = type;
  S.catId = null;

  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.type === type);
  });

  const amtEl  = document.getElementById('amount-display');
  const subBtn = document.getElementById('btn-submit');
  if (type === 'expense') {
    amtEl.className  = 'type-expense';
    subBtn.className = 'type-expense';
    subBtn.textContent = '記錄支出';
  } else {
    amtEl.className  = 'type-income';
    subBtn.className = 'type-income';
    subBtn.textContent = '記錄收入';
  }

  loadCategories();
}

// ══════════════════════════════════════════════════════════
// Mode (txn / stock)
// ══════════════════════════════════════════════════════════
function setMode(mode) {
  haptic(20);
  S.mode = mode;
  document.querySelectorAll('.mode-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode)
  );
  const txnIds  = ['type-bar', 'amount-wrap', 'cat-section'];
  const stockEl = document.getElementById('stock-panel');
  if (mode === 'txn') {
    txnIds.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = ''; });
    stockEl.classList.remove('visible');
    // restore submit button
    setType(S.type);
  } else {
    txnIds.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
    stockEl.classList.add('visible');
    updateStockSubmitBtn();
  }
}

// ══════════════════════════════════════════════════════════
// Stock helpers
// ══════════════════════════════════════════════════════════
function setStockAction(action) {
  haptic(20);
  S.stk.action = action;
  document.querySelectorAll('.stk-action-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.action === action)
  );
  // Relabel fields for dividend
  const isDividend = action === 'dividend';
  const sharesLabel = isDividend ? '股利金額' : '股數';
  const priceLabel  = isDividend ? '(選填)價格' : '價格';
  document.getElementById('stk-fld-label-shares').textContent = sharesLabel;
  document.getElementById('stk-fld-label-price').textContent  = priceLabel;
  document.getElementById('stk-fv-label-shares').textContent  = sharesLabel;
  document.getElementById('stk-fv-label-price').textContent   = priceLabel;
  document.getElementById('stk-amt-label').textContent =
    isDividend ? '股利金額（直接輸入）' : '交易金額（股數 × 價格）';
  updateStockDisplay();
  updateStockSubmitBtn();
}

function setStockMarket(market) {
  haptic(15);
  S.stk.market = market;
  document.querySelectorAll('.stk-mkt-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.market === market)
  );
}

function setNumpadField(field) {
  haptic(15);
  S.stk.activeField = field;
  document.querySelectorAll('.stk-fld-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.field === field)
  );
  ['shares', 'price', 'fee'].forEach(f => {
    document.getElementById(`stk-fv-${f}`).classList.toggle('active', f === field);
  });
}

function updateStockDisplay() {
  ['shares', 'price', 'fee'].forEach(f => {
    const el = document.getElementById(`stk-val-${f}`);
    if (el) el.textContent = fmtAmount(S.stk[f]);
  });
  const shares  = parseFloat(S.stk.shares) || 0;
  const price   = parseFloat(S.stk.price)  || 0;
  const computed = S.stk.action === 'dividend' ? shares : shares * price;
  const el = document.getElementById('stk-computed-amt');
  if (el) el.textContent = '$' + computed.toLocaleString('zh-TW', { maximumFractionDigits: 2 });
}

function updateStockSubmitBtn() {
  const btn = document.getElementById('btn-submit');
  const a   = S.stk.action;
  btn.className = `type-${a}`;
  btn.textContent = { buy: '記錄買入', sell: '記錄賣出', dividend: '記錄股利' }[a] || '記錄';
}

async function submitStock() {
  const ticker = document.getElementById('stk-ticker').value.trim().toUpperCase();
  if (!ticker) { toast('請輸入股票代號', 'error'); haptic([30,20,30]); return; }

  const shares = parseFloat(S.stk.shares) || 0;
  const price  = parseFloat(S.stk.price)  || 0;
  const fee    = parseFloat(S.stk.fee)    || 0;

  let amount;
  if (S.stk.action === 'dividend') {
    amount = shares;  // for dividend, shares field holds the dividend amount
    if (amount <= 0) { toast('請輸入股利金額', 'error'); haptic([30,20,30]); return; }
  } else {
    amount = shares * price;
    if (amount <= 0) { toast('請輸入股數和價格', 'error'); haptic([30,20,30]); return; }
  }

  const btn  = document.getElementById('btn-submit');
  const orig = btn.textContent;
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled  = true;
  haptic(30);

  try {
    const note = document.getElementById('inp-note').value.trim();
    const d = await apiFetch('/finance/stock/', {
      method: 'POST',
      body: JSON.stringify({
        date:    getDate(),
        ticker:  ticker,
        market:  S.stk.market,
        action:  S.stk.action,
        shares:  S.stk.action === 'dividend' ? 0 : shares,
        price:   S.stk.action === 'dividend' ? 0 : price,
        amount:  amount,
        fee:     fee,
        note:    note,
      }),
    });
    if (!d.success) throw new Error(d.message || '記錄失敗');

    haptic([40, 20, 60]);
    const lbl = { buy: '買入', sell: '賣出', dividend: '股利' }[S.stk.action];
    toast(`✅ ${ticker} ${lbl} $${amount.toLocaleString('zh-TW',{maximumFractionDigits:0})}`, 'success');

    // reset
    S.stk.shares = '0'; S.stk.price = '0'; S.stk.fee = '0';
    document.getElementById('stk-ticker').value = '';
    document.getElementById('inp-note').value = '';
    updateStockDisplay();
  } catch(e) {
    toast(`❌ ${e.message}`, 'error');
    haptic([50, 30, 50]);
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

// ══════════════════════════════════════════════════════════
// Numpad
// ══════════════════════════════════════════════════════════
function updateAmountDisplay() {
  document.getElementById('amount-text').textContent = fmtAmount(S.amtRaw);
}

function numpadEdit(cur, val, maxDec = 2, maxInt = 10) {
  if (val === 'del') {
    return cur.length <= 1 ? '0' : cur.slice(0, -1);
  } else if (val === '.') {
    return cur.includes('.') ? cur : cur + '.';
  } else {
    if (cur === '0') return val;
    const dotIdx = cur.indexOf('.');
    if (dotIdx !== -1 && cur.length - dotIdx > maxDec) return cur;
    if (cur.replace('.', '').length >= maxInt) return cur;
    return cur + val;
  }
}

function numpadPress(val) {
  haptic(15);
  if (S.mode === 'txn') {
    S.amtRaw = numpadEdit(S.amtRaw, val);
    updateAmountDisplay();
  } else {
    // stock mode — target activeField
    const f = S.stk.activeField;
    S.stk[f] = numpadEdit(S.stk[f], val, 4);
    updateStockDisplay();
  }
}

// ══════════════════════════════════════════════════════════
// Date
// ══════════════════════════════════════════════════════════
function setDate(d) {
  haptic(15);
  S.date = d;
  document.querySelectorAll('.date-pill').forEach(b => {
    b.classList.toggle('active', b.dataset.d === d);
  });
  const wrap = document.getElementById('custom-date-wrap');
  wrap.style.display = (d === 'custom') ? 'block' : 'none';
  if (d === 'custom' && !S.customDate) {
    S.customDate = todayStr();
    document.getElementById('custom-date-input').value = S.customDate;
  }
}

// ══════════════════════════════════════════════════════════
// Submit
// ══════════════════════════════════════════════════════════
async function submitEntry() {
  if (S.mode === 'stock') { return submitStock(); }
  const amt = parseFloat(S.amtRaw);
  if (!amt || amt <= 0) { toast('請輸入金額', 'error'); haptic([30,20,30]); return; }
  if (!S.catId) { toast('請選擇分類', 'error'); haptic([30,20,30]); return; }

  const btn = document.getElementById('btn-submit');
  const orig = btn.textContent;
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  haptic(30);

  try {
    const note = document.getElementById('inp-note').value.trim();
    const d = await apiFetch('/finance/transaction/', {
      method: 'POST',
      body: JSON.stringify({
        date:        getDate(),
        type:        S.type,
        amount:      amt,
        category_id: S.catId,
        description: note || (S.type === 'expense' ? '支出' : '收入'),
        note:        '',
      }),
    });
    if (!d.success) throw new Error(d.message || '記錄失敗');

    haptic([40, 20, 60]);
    toast(`✅ 已記錄${S.type === 'expense' ? '支出' : '收入'} $${fmtAmount(S.amtRaw)}`, 'success');

    // reset
    S.amtRaw = '0'; S.catId = null;
    document.getElementById('inp-note').value = '';
    updateAmountDisplay();
    renderCats();

  } catch(e) {
    toast(`❌ ${e.message}`, 'error');
    haptic([50, 30, 50]);
  } finally {
    btn.textContent = orig;
    btn.disabled = false;
  }
}

// ══════════════════════════════════════════════════════════
// Recent panel
// ══════════════════════════════════════════════════════════
async function openRecent() {
  haptic(20);
  document.getElementById('recent-overlay').classList.add('open');
  // open to the tab that matches current mode
  await loadRecentTab(S.mode === 'stock' ? 'stock' : 'txn');
}

async function loadRecentTab(tab) {
  S.recentTab = tab;
  document.querySelectorAll('.rtab-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.rtab === tab)
  );
  const list = document.getElementById('recent-list');
  list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--clr-muted)">載入中…</div>';
  try {
    if (tab === 'txn') {
      const d    = await apiFetch('/finance/transaction/?limit=10&offset=0');
      const rows = d.data || [];
      if (!rows.length) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--clr-muted)">尚無記錄</div>';
        return;
      }
      list.innerHTML = rows.map(r => {
        const cls     = r.type === 'expense' ? 'expense' : 'income';
        const sign    = r.type === 'expense' ? '-' : '+';
        const bg      = r.category_color || '#5c7cfa';
        const rawIco  = r.category_icon  || 'bi-tag';
        const icoHtml = rawIco.startsWith('bi-') ? `<i class="bi ${rawIco}"></i>` : rawIco;
        const amt  = parseFloat(r.amount || 0).toLocaleString('zh-TW', { maximumFractionDigits: 0 });
        const desc = r.description || r.category_name || '—';
        return `<div class="rec-item">
          <div class="rec-icon" style="background:${bg}22;color:${bg}">${icoHtml}</div>
          <div class="rec-info">
            <div class="rec-desc">${desc}</div>
            <div class="rec-meta">${r.date} · ${r.category_name || '未分類'}</div>
          </div>
          <div class="rec-amount ${cls}">${sign}$${amt}</div>
        </div>`;
      }).join('');
    } else {
      // stock tab
      const d    = await apiFetch('/finance/stock/?limit=10&offset=0');
      const rows = d.data || [];
      if (!rows.length) {
        list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--clr-muted)">尚無股票記錄</div>';
        return;
      }
      const actionLabel = { buy: '買入', sell: '賣出', dividend: '股利' };
      const actionColor = { buy: '#3b82f6', sell: '#f97316', dividend: '#10b981' };
      const actionIco   = { buy: 'bi-arrow-down-right-circle-fill', sell: 'bi-arrow-up-right-circle-fill', dividend: 'bi-cash-coin' };
      list.innerHTML = rows.map(r => {
        const action = r.action || 'buy';
        const clr    = actionColor[action] || '#5c7cfa';
        const ico    = actionIco[action]   || 'bi-graph-up';
        const amt    = parseFloat(r.amount || 0).toLocaleString('zh-TW', { maximumFractionDigits: 0 });
        const name   = r.company_name ? `${r.ticker} ${r.company_name}` : r.ticker;
        const detail = r.shares ? ` · ${r.shares}股 @${r.price}` : '';
        return `<div class="rec-item">
          <div class="rec-icon" style="background:${clr}22;color:${clr}"><i class="bi ${ico}"></i></div>
          <div class="rec-info">
            <div class="rec-desc">${name}</div>
            <div class="rec-meta">${r.date} · ${actionLabel[action] || action}${detail}</div>
          </div>
          <div class="rec-amount ${action}">$${amt}</div>
        </div>`;
      }).join('');
    }
  } catch(e) {
    console.warn('recent', e);
    list.innerHTML = '<div style="padding:20px;text-align:center;color:var(--clr-muted)">載入失敗</div>';
  }
}

function closeRecent() {
  document.getElementById('recent-overlay').classList.remove('open');
}

// ══════════════════════════════════════════════════════════
// Login
// ══════════════════════════════════════════════════════════
async function handleLogin() {
  const btn  = document.getElementById('btn-login');
  const err  = document.getElementById('login-err');
  const user = document.getElementById('inp-user').value.trim();
  const pass = document.getElementById('inp-pass').value;
  if (!user || !pass) { err.textContent = '請輸入帳號密碼'; return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 登入中…';
  err.textContent = '';
  try {
    await doLogin(user, pass);
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('topbar-user').textContent = S.displayName || S.username;
    await loadCategories();
  } catch(e) {
    err.textContent = e.message;
    btn.disabled = false;
    btn.textContent = '登入';
  }
}

// ══════════════════════════════════════════════════════════
// Register (quick page)
// ══════════════════════════════════════════════════════════
function switchQlTab(tab) {
  const isLogin = tab === 'login';
  document.getElementById('ql-login-form').style.display    = isLogin ? 'flex' : 'none';
  document.getElementById('ql-register-form').style.display = isLogin ? 'none' : 'flex';
  document.getElementById('ql-subtitle').textContent =
    isLogin ? '請登入以開始記錄' : '建立您的帳號';
  // 清除舊訊息
  ['login-err','register-err','register-ok'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = '';
  });
}

async function handleRegister() {
  const username = document.getElementById('reg-user').value.trim();
  const name     = document.getElementById('reg-name').value.trim();
  const pw       = document.getElementById('reg-pw').value;
  const pw2      = document.getElementById('reg-pw2').value;
  const errEl    = document.getElementById('register-err');
  const okEl     = document.getElementById('register-ok');

  errEl.textContent = ''; okEl.textContent = '';

  if (!username || !pw) { errEl.textContent = '帳號和密碼為必填'; return; }
  if (pw !== pw2)       { errEl.textContent = '兩次密碼不一致';   return; }
  if (pw.length < 6)    { errEl.textContent = '密碼至少 6 個字元'; return; }

  const btn = document.getElementById('btn-register');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> 建立中…';

  try {
    const res  = await fetch('/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, display_name: name, password: pw, confirm_password: pw2 }),
    });
    const d = await res.json();
    if (!d.success) throw new Error(d.message || '註冊失敗');

    S.token       = d.token;
    S.username    = d.username;
    S.displayName = d.display_name || d.username;
    localStorage.setItem('finance_token',        S.token);
    localStorage.setItem('finance_username',     S.username);
    localStorage.setItem('finance_display_name', S.displayName);

    okEl.textContent = `歡迎 ${S.displayName}！`;
    haptic([40, 20, 60]);
    setTimeout(() => {
      document.getElementById('login-overlay').style.display = 'none';
      document.getElementById('topbar-user').textContent = S.displayName || S.username;
      loadCategories();
    }, 600);
  } catch(e) {
    errEl.textContent = e.message;
    btn.disabled = false;
    btn.textContent = '建立帳號';
  }
}

// ══════════════════════════════════════════════════════════
// Event bindings
// ══════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  // mode bar
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.addEventListener('click', () => setMode(b.dataset.mode));
  });

  // type buttons
  document.querySelectorAll('.type-btn').forEach(b => {
    b.addEventListener('click', () => setType(b.dataset.type));
  });

  // stock action
  document.querySelectorAll('.stk-action-btn').forEach(b => {
    b.addEventListener('click', () => setStockAction(b.dataset.action));
  });

  // stock market
  document.querySelectorAll('.stk-mkt-btn').forEach(b => {
    b.addEventListener('click', () => setStockMarket(b.dataset.market));
  });

  // stock numpad field selector
  document.querySelectorAll('.stk-fld-btn').forEach(b => {
    b.addEventListener('click', () => setNumpadField(b.dataset.field));
  });

  // ticker input auto-uppercase
  document.getElementById('stk-ticker').addEventListener('input', e => {
    const pos = e.target.selectionStart;
    e.target.value = e.target.value.toUpperCase();
    e.target.setSelectionRange(pos, pos);
    S.stk.ticker = e.target.value;
  });

  // numpad
  document.querySelectorAll('.np-btn').forEach(b => {
    b.addEventListener('click', () => numpadPress(b.dataset.val));
  });

  // date pills
  document.querySelectorAll('.date-pill').forEach(b => {
    b.addEventListener('click', () => setDate(b.dataset.d));
  });

  // custom date
  document.getElementById('custom-date-input').addEventListener('change', e => {
    S.customDate = e.target.value;
  });

  // submit
  document.getElementById('btn-submit').addEventListener('click', submitEntry);

  // history
  document.getElementById('btn-history').addEventListener('click', openRecent);
  document.getElementById('recent-handle').addEventListener('click', closeRecent);
  document.getElementById('recent-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('recent-overlay')) closeRecent();
  });

  // recent tabs
  document.querySelectorAll('.rtab-btn').forEach(b => {
    b.addEventListener('click', () => loadRecentTab(b.dataset.rtab));
  });

  // login
  document.getElementById('btn-login').addEventListener('click', handleLogin);
  document.getElementById('inp-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });

  // register
  document.getElementById('btn-register').addEventListener('click', handleRegister);
  document.getElementById('reg-pw2').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleRegister();
  });

  // init
  if (S.token) {
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('topbar-user').textContent = S.displayName || S.username;
    loadCategories();
  }

  // set today as default custom date
  document.getElementById('custom-date-input').value = todayStr();
  S.customDate = todayStr();
});
</script>
</body>
</html>
