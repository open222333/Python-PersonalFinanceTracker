# ============================================================
# 主機 nginx 設定 — 純 HTTP
# 適用：本機開發、IP 直連、或由 Cloudflare 在外層處理 HTTPS
#
# 使用方式：
#   sudo cp this_file /etc/nginx/sites-available/flask-app
#   # 將 YOUR_DOMAIN 替換為實際域名，或改為 _ 接受所有請求
#   sudo ln -s /etc/nginx/sites-available/flask-app /etc/nginx/sites-enabled/flask-app
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

upstream flask_app {
    server 127.0.0.1:5000;   # Flask 容器 port（docker-compose 需 ports: "127.0.0.1:5000:5000"）
}

server {
    listen      80;
    server_name YOUR_DOMAIN;  # 改為實際域名，或 _ 代表接受任何域名

    client_max_body_size 20M;

    access_log  /var/log/nginx/flask-app-access.log;
    error_log   /var/log/nginx/flask-app-error.log;

    location / {
        proxy_pass         http://flask_app;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    location /nginx-health {
        access_log  off;
        return      200 "ok\n";
        add_header  Content-Type text/plain;
    }
}
