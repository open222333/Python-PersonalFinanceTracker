# ============================================================
# 主機 nginx 設定 — Let's Encrypt SSL
# 適用：伺服器直接暴露網際網路，使用免費 SSL 憑證
#
# 前置作業：
#   1. 安裝 certbot：
#      sudo apt install -y certbot python3-certbot-nginx
#   2. 申請憑證（先用 http.conf 啟動 nginx 後再申請）：
#      sudo certbot --nginx -d YOUR_DOMAIN
#      # 或 webroot 方式：
#      sudo certbot certonly --webroot -w /var/www/certbot -d YOUR_DOMAIN
#   3. 憑證位置：/etc/letsencrypt/live/YOUR_DOMAIN/
#
# 使用方式：
#   sudo cp this_file /etc/nginx/sites-available/flask-app
#   # 將所有 YOUR_DOMAIN 替換為實際域名（共 4 處）
#   sudo ln -s /etc/nginx/sites-available/flask-app /etc/nginx/sites-enabled/flask-app
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

upstream flask_app {
    server 127.0.0.1:5000;
}

# HTTP → HTTPS 強制導向（同時提供 certbot webroot 驗證）
server {
    listen      80;
    server_name YOUR_DOMAIN;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen      443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;

    # HSTS（可選，強制 HTTPS）
    # add_header Strict-Transport-Security "max-age=63072000" always;

    client_max_body_size 20M;

    access_log  /var/log/nginx/flask-app-access.log;
    error_log   /var/log/nginx/flask-app-error.log;

    location / {
        proxy_pass         http://flask_app;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    location /nginx-health {
        access_log  off;
        return      200 "ok\n";
        add_header  Content-Type text/plain;
    }
}
